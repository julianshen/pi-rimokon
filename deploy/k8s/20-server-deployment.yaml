# Pi Remote Server.
#
# IMPORTANT: replicas MUST be 1. The broker registry + tickets are in-memory
# (spec v1, single instance); two replicas would split sessions across pods and
# break routing. Horizontal scale is a v2 concern (shared bus). Do not add an
# HPA. Use Recreate so a rollout never briefly runs two pods.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pi-remote-server
  namespace: pi-remote
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: pi-remote-server }
  template:
    metadata:
      labels: { app: pi-remote-server }
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      # Apply DB migrations once before the server starts (idempotent: IF NOT
      # EXISTS + per-file transactions, so it's safe on every rollout).
      initContainers:
        - name: migrate
          image: pi-remote-server:0.1.0
          imagePullPolicy: IfNotPresent
          command: ["node", "--import", "tsx", "src/db/runMigrate.ts"]
          envFrom:
            - secretRef: { name: pi-remote-server }
          securityContext: &hardened
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      containers:
        - name: server
          image: pi-remote-server:0.1.0
          imagePullPolicy: IfNotPresent # locally-imported image; not from a registry
          securityContext: *hardened
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
          ports:
            - containerPort: 8787
          envFrom:
            - secretRef: { name: pi-remote-server }
          readinessProbe:
            httpGet: { path: /healthz, port: 8787 }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8787 }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests: { cpu: "50m", memory: "96Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
      # Writable scratch for tsx/esbuild + Node under readOnlyRootFilesystem.
      volumes:
        - name: tmp
          emptyDir: {}
      # Give the server time to drain sockets (SIGTERM → reconnect_hint + 1001).
      terminationGracePeriodSeconds: 15
