# Copy to server-secret.yaml and fill in (DO NOT commit the filled copy).
# stringData keeps values human-readable; K8s base64-encodes them. PEMs can be
# pasted as real multi-line blocks here (unlike the .env file's \n form).
apiVersion: v1
kind: Secret
metadata:
  name: pi-remote-server
  namespace: pi-remote
type: Opaque
stringData:
  PORT: "8787"
  # Supabase Postgres (service role) — the system of record.
  DATABASE_URL: "postgresql://postgres:<PASSWORD>@db.<REF>.supabase.co:5432/postgres"
  # Public origin agents/clients reach (the tunnel hostname).
  JWT_ISSUER: "https://agents.jlnshen.com"
  # Supabase project URL — device approval verifies the user's Supabase JWT.
  SUPABASE_URL: "https://<REF>.supabase.co"
  # Browser origin allowed on /client + the device/ticket endpoints (the SPA).
  ALLOWED_ORIGIN: "https://pi-rimokon.vercel.app"
  # RS256 keypair (openssl genpkey … / rsa -pubout). Paste the full PEM blocks.
  AGENT_JWT_PRIVATE_KEY: |
    -----BEGIN PRIVATE KEY-----
    ...
    -----END PRIVATE KEY-----
  AGENT_JWT_PUBLIC_KEY: |
    -----BEGIN PUBLIC KEY-----
    ...
    -----END PUBLIC KEY-----
  # Optional hardening overrides (defaults: 20 / 10 / 120 / 1000).
  # MAX_SESSIONS_PER_USER: "20"
  # MAX_CLIENTS_PER_USER: "10"
